# Render Blueprint — deploys the Squid set-list app as a free web service
# backed by a free Postgres database. https://render.com/docs/blueprint-spec
#
# The free web-service tier has no persistent disk, so data lives in a managed
# Postgres database instead (DATABASE_URL is injected automatically). The app's
# data layer uses Postgres when DATABASE_URL is set, SQLite otherwise.
#
# Note: Render's free Postgres instances expire ~90 days after creation and
# need recreating. For this app that just means re-running the seed.
databases:
  - name: squid-db
    plan: free

services:
  - type: web
    name: squid-setlists
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker python.main:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: squid-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.9"
